<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart E-Reader IUP UNAIR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.1.5/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.js"></script>
    
    <style>
        :root { --bg: #fdfcf8; --accent: #3498db; --text: #2c3e50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        
        /* Navigasi */
        .nav-bar { background: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; z-index: 100; }
        .btn { padding: 10px 15px; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 600; }
        .btn-blue { background: var(--accent); color: white; border: none; }

        /* Rak Buku */
        #library-view { height: 100vh; overflow-y: auto; padding: 20px; display: block; }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .book-card { cursor: pointer; text-align: center; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .book-cover { width: 100%; height: 180px; background: #f0f0f0; border-radius: 8px; object-fit: cover; }
        .book-title { font-size: 12px; margin-top: 8px; font-weight: bold; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Reader */
        #reader-view { display: none; height: 100vh; flex-direction: column; background: white; }
        #viewer { flex: 1; width: 100%; height: 100%; background: white; }

        /* Flashcard View */
        #quiz-view { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .q-card { background: white; padding: 40px; border-radius: 20px; border: 2px solid var(--accent); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* Popup Kamus */
        #dict-popup { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; border: 2px solid var(--accent); box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="library-view">
    <div class="nav-bar">
        <span style="font-size: 18px; font-weight: bold;">📚 My Library</span>
        <div style="display: flex; gap: 8px;">
            <button class="btn" onclick="showQuiz()">📝 Flashcards</button>
            <button class="btn btn-blue" onclick="document.getElementById('file-upload').click()">+ Tambah</button>
        </div>
    </div>
    <input type="file" id="file-upload" accept=".epub" style="display:none" onchange="addBook(this)">
    <div class="book-grid" id="book-grid" style="margin-top: 20px;"></div>
</div>

<div id="reader-view">
    <header class="nav-bar">
        <button class="btn" onclick="showLibrary()">⬅️ Kembali</button>
        <div id="reader-title" style="font-weight: bold; font-size: 14px;">Membaca...</div>
        <div style="display: flex; gap: 5px;">
            <button class="btn" onclick="rendition.prev()">Prev</button>
            <button class="btn" onclick="rendition.next()">Next</button>
        </div>
    </header>
    <div id="viewer"></div>
</div>

<div id="quiz-view">
    <div class="q-card">
        <h1 id="q-word" style="color: var(--accent);">---</h1>
        <p id="q-meaning" style="display:none; color: #27ae60; font-size: 20px; font-weight: bold; margin-top: 15px;"></p>
    </div>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button class="btn" onclick="document.getElementById('q-meaning').style.display='block'">Cek Arti</button>
        <button class="btn btn-blue" onclick="nextQ()">Acak Kata</button>
        <button class="btn" onclick="showLibrary()">Selesai</button>
    </div>
</div>

<div id="dict-popup">
    <b id="pop-word" style="font-size: 20px; color: var(--accent);">Word</b>
    <p id="pop-meaning" style="margin: 10px 0; color: #444;">Menerjemahkan...</p>
    <div style="display: flex; gap: 8px;">
        <button class="btn btn-blue" style="flex: 2;" onclick="saveVocab()">Simpan Kata</button>
        <button class="btn" style="flex: 1;" onclick="closePopup()">Tutup</button>
    </div>
</div>

<script>
    let book, rendition, currentWord, currentMeaning;

    // FUNGSI RAK BUKU
    async function addBook(input) {
        const file = input.files[0];
        if (!file) return;

        const tempBook = ePub(file);
        const title = file.name.replace('.epub', '');
        let coverUrl = "https://via.placeholder.com/150x200?text=EPUB";
        
        try { coverUrl = await tempBook.coverUrl(); } catch (e) {}

        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `<img class="book-cover" src="${coverUrl || 'https://via.placeholder.com/150x200?text=EPUB'}"><div class="book-title">${title}</div>`;
        card.onclick = () => openBook(file, title);
        document.getElementById('book-grid').appendChild(card);
        input.value = ""; // Reset input
    }

    // FUNGSI BUKA BUKU
    function openBook(file, title) {
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'flex';
        document.getElementById('reader-title').innerText = title;

        if (book) book.destroy();
        
        // Membaca EPUB dari file lokal/upload
        const reader = new FileReader();
        reader.onload = function(e) {
            book = ePub(e.target.result);
            rendition = book.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated", manager: "default" });
            rendition.display();

            // Setup Kontrol
            setupReaderControls();
        };
        reader.readAsArrayBuffer(file);
    }

    function setupReaderControls() {
        // Klik Layar untuk Next
        rendition.on("touchstart", (e) => { this.startTime = Date.now(); });
        rendition.on("touchend", (e) => {
            if (Date.now() - this.startTime < 200 && document.getElementById('dict-popup').style.display !== 'block') {
                rendition.next();
            }
        });

        // Seleksi Kata untuk Translate
        rendition.on("selected", async (cfiRange, contents) => {
            const text = contents.window.getSelection().toString().trim();
            if (text && text.length < 50) {
                currentWord = text;
                showTranslate(text);
                contents.window.getSelection().removeAllRanges();
            }
        });
    }

    async function showTranslate(text) {
        const popup = document.getElementById('dict-popup');
        document.getElementById('pop-word').innerText = text;
        document.getElementById('pop-meaning').innerText = "Mencari...";
        popup.style.display = 'block';

        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|id`);
            const data = await res.json();
            currentMeaning = data.responseData.translatedText;
            document.getElementById('pop-meaning').innerText = currentMeaning;
        } catch (e) { document.getElementById('pop-meaning').innerText = "Butuh internet."; }
    }

    function saveVocab() {
        let db = JSON.parse(localStorage.getItem('iup_vocab') || "[]");
        if(!db.find(x => x.w === currentWord)) {
            db.push({ w: currentWord, m: currentMeaning });
            localStorage.setItem('iup_vocab', JSON.stringify(db));
            alert("Tersimpan!");
        }
        closePopup();
    }

    function showQuiz() {
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'flex';
        nextQ();
    }

    function nextQ() {
        let db = JSON.parse(localStorage.getItem('iup_vocab') || "[]");
        if(db.length === 0) { alert("Simpan kata dulu!"); showLibrary(); return; }
        let item = db[Math.floor(Math.random() * db.length)];
        document.getElementById('q-word').innerText = item.w;
        document.getElementById('q-meaning').innerText = item.m;
        document.getElementById('q-meaning').style.display = 'none';
    }

    function showLibrary() {
        document.getElementById('library-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'none';
    }
    function closePopup() { document.getElementById('dict-popup').style.display = 'none'; }
</script>
</body>
</html>
    </header>
    <div id="viewer"></div>
</div>

<div id="quiz-view">
    <h2 style="margin-bottom: 25px;">Vocabulary Practice</h2>
    <div class="quiz-card">
        <h1 id="q-word" style="font-size: 36px; margin: 0; color: var(--accent);">Start?</h1>
        <p id="q-meaning" style="display:none; color: #27ae60; font-size: 26px; margin-top: 25px; font-weight: bold;"></p>
    </div>
    <div style="margin-top: 40px; display: flex; gap: 15px;">
        <button class="btn" onclick="document.getElementById('q-meaning').style.display='block'">Check Meaning</button>
        <button class="btn btn-primary" onclick="nextQ()">Random Word</button>
        <button class="btn" onclick="showLibrary()">Close</button>
    </div>
</div>

<div id="dict-popup">
    <div style="font-size: 22px; font-weight: 800; color: var(--accent);" id="pop-word">Word</div>
    <div style="margin: 15px 0; font-size: 18px; color: #444; line-height: 1.4;" id="pop-meaning">Translating...</div>
    <div style="display: flex; gap: 12px; margin-top: 20px;">
        <button class="btn btn-primary" style="flex: 2; justify-content: center;" onclick="saveVocab()">Save Word</button>
        <button class="btn" style="flex: 1; justify-content: center;" onclick="closePopup()">Close</button>
    </div>
</div>

<script>
    let book, rendition, currentWord, currentMeaning;

    // --- LOGIKA LIBRARY ---
    async function addBook(input) {
        const file = input.files[0];
        if (!file) return;

        const tempBook = ePub(file);
        const title = file.name.replace('.epub', '');
        let coverUrl = "https://via.placeholder.com/150x200?text=No+Cover";
        
        try { coverUrl = await tempBook.coverUrl(); } catch (e) {}

        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = `
            <img class="book-cover" src="${coverUrl || 'https://via.placeholder.com/150x200?text=No+Cover'}">
            <div class="book-title">${title}</div>
        `;
        card.onclick = () => openBook(file, title);
        document.getElementById('book-grid').appendChild(card);
    }

    // --- LOGIKA READER ---
    function openBook(file, title) {
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('reader-view').style.display = 'flex';
        document.getElementById('reader-title').innerText = title;

        if (book) book.destroy();
        book = ePub(file);
        rendition = book.renderTo("viewer", {
            width: "100%", height: "100%", flow: "paginated", manager: "default"
        });
        rendition.display();

        // Responsive Layout
        const updateLayout = () => rendition.spread(window.innerWidth > window.innerHeight ? "always" : "none");
        window.onresize = updateLayout;
        updateLayout();

        // One-Tap Page Turn
        rendition.on("touchstart", (e) => { this.startTime = Date.now(); });
        rendition.on("touchend", (e) => {
            if (Date.now() - this.startTime < 200 && document.getElementById('dict-popup').style.display !== 'block') {
                rendition.next();
            }
        });

        // Long Press Translate
        rendition.on("selected", async (cfiRange, contents) => {
            const text = contents.window.getSelection().toString().trim();
            if (text && text.length < 50) {
                currentWord = text;
                showTranslate(text);
                contents.window.getSelection().removeAllRanges();
            }
        });
    }

    // --- LOGIKA TRANSLATE & VOCAB ---
    async function showTranslate(text) {
        const popup = document.getElementById('dict-popup');
        document.getElementById('pop-word').innerText = text;
        document.getElementById('pop-meaning').innerText = "Translating...";
        popup.style.display = 'block';

        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|id`);
            const data = await res.json();
            currentMeaning = data.responseData.translatedText;
            document.getElementById('pop-meaning').innerText = currentMeaning;
        } catch (e) { document.getElementById('pop-meaning').innerText = "Check internet connection."; }
    }

    function saveVocab() {
        let db = JSON.parse(localStorage.getItem('iup_unair_vocab') || "[]");
        if(!db.find(x => x.w === currentWord)) {
            db.push({ w: currentWord, m: currentMeaning });
            localStorage.setItem('iup_unair_vocab', JSON.stringify(db));
            alert("Saved to flashcards!");
        }
        closePopup();
    }

    // --- LOGIKA FLASHCARDS ---
    function showQuiz() {
        document.getElementById('library-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'flex';
        nextQ();
    }

    function nextQ() {
        let db = JSON.parse(localStorage.getItem('iup_unair_vocab') || "[]");
        if(db.length === 0) { 
            document.getElementById('q-word').innerText = "Empty List"; 
            document.getElementById('q-meaning').innerText = "Save some words first!";
            document.getElementById('q-meaning').style.display = 'block';
            return; 
        }
        let item = db[Math.floor(Math.random() * db.length)];
        document.getElementById('q-word').innerText = item.w;
        document.getElementById('q-meaning').innerText = item.m;
        document.getElementById('q-meaning').style.display = 'none';
    }

    // --- NAVIGATION ---
    function showLibrary() {
        document.getElementById('library-view').style.display = 'block';
        document.getElementById('reader-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'none';
    }
    function closePopup() { document.getElementById('dict-popup').style.display = 'none'; }
</script>
</body>

        <p id="q-meaning" style="display:none; color: var(--accent); font-size: 24px; margin-top: 20px; font-weight: bold;"></p>

    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button class="btn" onclick="document.getElementById('q-meaning').style.display='block'">Cek Arti</button>
        <button class="btn btn-blue" onclick="nextQ()">Kata Acak</button>
        <button class="btn" onclick="showLibrary()">Selesai</button>
    </div>
</div>
